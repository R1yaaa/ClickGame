<!DOCTYPE html>
<html lang="en">
<head>

    <main>
        <div id="game-container">

                    Helden-Test? Den <strong>m</strong>acht ihr nicht!<br><br>

                    Ich klecks euch alles voll—zack, platsch!
                    Dann kommt ihr nicht durch <strong>mein</strong>en Matsch!
                </p>
                <div id="taunt-popup">
                    <img src="assets/images/schurke.png" alt="Schurke">
                    <div class="taunt-text">Ätsch!</div>
                </div>
</div>
        </div>

    <audio src="assets/audios/aetsch.mp3" id="audio-1"></audio>
    <audio src="assets/audios/mich-kriegt-ihr-nie.mp3" id="audio-2"></audio>
