<!DOCTYPE html>
<html lang="en">
<head>

<body>

    <main>
        <div id="game-container">
                <p class="hidden-message">
                    Helden-Test? Den <strong>m</strong>achst du nicht!<br><br>
                    Ich Farbchaos <strong>sa</strong>g´s dir ins <strong>Ge</strong>sicht.<br><br>
                    Ich klecks dir alles voll—zack, platsch!
                    Dann kommst du nicht durch <strong>mein</strong>en Matsch!
                </p>
                <div id="taunt-popup">
                    <img src="images/schurke.png" alt="Schurke">
                    <div class="taunt-text">Ätsch!</div>
                </div>
</div>
        </div>
    </main>

    <script src="script.js"></script>
